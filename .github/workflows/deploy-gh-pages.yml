name: Deploy Zola site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Zola
        # Override base_url so canonical links / sitemap point at the .github.io host
        # (config.toml's base_url is for saravanand.com).
        uses: getzola/zola@v0.22.0
        with:
          args: build --base-url https://saravan2.github.io

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
